syntax = "proto3";
 
option csharp_namespace = "TestAPI.Grpc"; //пространство, куда помещаются сгенерированные классы
 
package greet;
 
// определение сервиса
service Greeter {
  // отправка сообщения
  rpc SayHello (HelloRequest) returns (HelloReply);
}
 
// сообщение от клиента содержит name
message HelloRequest {
  string name = 1;
  string UserMessage = 2;
}
 
// сообщение клиенту содержит message
message HelloReply {
  string Response= 1;
}